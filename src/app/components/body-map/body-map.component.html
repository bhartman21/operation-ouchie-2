<div class="body-map-container">
    <!-- View Toggle -->
    <div class="view-toggle btn-group w-100 mb-3" role="group">
        <button type="button" class="btn btn-sm"
            [class.btn-warning]="activeView === 'exterior'"
            [class.btn-outline-secondary]="activeView !== 'exterior'"
            (click)="setView('exterior')">
            <i class="bi bi-person me-1"></i>Exterior
        </button>
        <button type="button" class="btn btn-sm"
            [class.btn-warning]="activeView === 'interior'"
            [class.btn-outline-secondary]="activeView !== 'interior'"
            (click)="setView('interior')">
            <i class="bi bi-lungs me-1"></i>Interior
        </button>
    </div>

    <!-- Selected Region Badge -->
    @if (selectedRegion) {
        <div class="selected-badge mb-2">
            <span class="badge bg-warning text-dark w-100 py-2">
                <i class="bi bi-geo-alt-fill me-1"></i>{{ selectedRegion.label }}
                <button type="button" class="btn-close btn-close-sm ms-2"
                    (click)="$event.stopPropagation(); clearSelection()" aria-label="Clear body filter">
                </button>
            </span>
        </div>
    }

    <div class="map-viewport-container"
        (mousedown)="startPan($event)"
        (mousemove)="doPan($event)"
        (mouseup)="endPan()"
        (mouseleave)="endPan()"
        (touchstart)="startPan($event)"
        (touchmove)="doPan($event)"
        (touchend)="endPan()"
        [class.panning]="isPanning"
        [class.zoomable]="zoomLevel > 1">

        <!-- Zoom Controls Overlay -->
        <div class="zoom-controls">
            <button class="btn btn-dark btn-sm" (click)="zoomIn()" title="Zoom In">
                <i class="bi bi-plus-lg"></i>
            </button>
            <button class="btn btn-dark btn-sm" (click)="zoomOut()" title="Zoom Out">
                <i class="bi bi-dash-lg"></i>
            </button>
            <button class="btn btn-dark btn-sm" (click)="resetZoom()" title="Reset Zoom">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>
        </div>

        <div class="zoom-wrapper" [style.transform]="'scale(' + zoomLevel + ') translate(' + translateX/zoomLevel + 'px, ' + translateY/zoomLevel + 'px)'">
            @if (activeView === 'exterior') {
                <svg class="body-svg" viewBox="0 0 200 440" xmlns="http://www.w3.org/2000/svg"
                    role="img" aria-label="Exterior body diagram">
                    <g class="body-outline">
                        <!-- Head -->
                        <ellipse cx="100" cy="42" rx="32" ry="38" />
                        <!-- Neck -->
                        <rect x="88" y="78" width="24" height="18" />
                        <!-- Torso -->
                        <rect x="58" y="94" width="84" height="114" rx="4" />
                        <!-- Arms -->
                        <polygon points="58,98 36,108 28,188 50,188 62,128" />
                        <polygon points="142,98 164,108 172,188 150,188 138,128" />
                        <!-- Hands -->
                        <rect x="22" y="188" width="30" height="30" rx="4" />
                        <rect x="148" y="188" width="30" height="30" rx="4" />
                        <!-- Hips -->
                        <rect x="52" y="208" width="96" height="36" rx="4" />
                        <!-- Legs -->
                        <rect x="56" y="242" width="36" height="100" rx="4" />
                        <rect x="108" y="242" width="36" height="100" rx="4" />
                        <!-- Feet -->
                        <rect x="50" y="340" width="44" height="22" rx="4" />
                        <rect x="106" y="340" width="44" height="22" rx="4" />
                    </g>
                    
                    <!-- Head Features (Face) -->
                    <g class="face-features">
                        <!-- Eyes -->
                        <ellipse class="body-region" [class.region-selected]="isSelected(exteriorRegions[1])" cx="88" cy="35" rx="5" ry="3" (click)="selectRegion(exteriorRegions[1])" />
                        <ellipse class="body-region" [class.region-selected]="isSelected(exteriorRegions[1])" cx="112" cy="35" rx="5" ry="3" (click)="selectRegion(exteriorRegions[1])" />
                        <!-- Ears -->
                        <ellipse class="body-region" [class.region-selected]="isSelected(exteriorRegions[2])" cx="66" cy="42" rx="3" ry="6" (click)="selectRegion(exteriorRegions[2])" />
                        <ellipse class="body-region" [class.region-selected]="isSelected(exteriorRegions[2])" cx="134" cy="42" rx="3" ry="6" (click)="selectRegion(exteriorRegions[2])" />
                    </g>

                    <!-- Main Head Area -->
                    <ellipse class="body-region" [class.region-selected]="isSelected(exteriorRegions[0])" cx="100" cy="42" rx="32" ry="38" (click)="selectRegion(exteriorRegions[0])" opacity="0.1"></ellipse>
                    
                    <!-- Neck -->
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[3])" x="88" y="78" width="24" height="18" rx="2" (click)="selectRegion(exteriorRegions[3])"></rect>
                    
                    <!-- Arms -->
                    <polygon class="body-region" [class.region-selected]="isSelected(exteriorRegions[4])" points="58,98 36,108 28,188 50,188 62,128" (click)="selectRegion(exteriorRegions[4])"></polygon>
                    <polygon class="body-region" [class.region-selected]="isSelected(exteriorRegions[4])" points="142,98 164,108 172,188 150,188 138,128" (click)="selectRegion(exteriorRegions[4])"></polygon>
                    
                    <!-- Hands -->
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[5])" x="22" y="188" width="30" height="30" rx="4" (click)="selectRegion(exteriorRegions[5])"></rect>
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[5])" x="148" y="188" width="30" height="30" rx="4" (click)="selectRegion(exteriorRegions[5])"></rect>
                    
                    <!-- Chest -->
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[6])" x="62" y="96" width="76" height="58" rx="2" (click)="selectRegion(exteriorRegions[6])"></rect>
                    
                    <!-- Spine -->
                    <rect class="body-region region-secondary" [class.region-selected]="isSelected(exteriorRegions[7])" x="96" y="96" width="8" height="114" rx="2" (click)="selectRegion(exteriorRegions[7])"></rect>
                    
                    <!-- Abdomen (Interior trigger) -->
                    <rect class="body-region" x="62" y="154" width="76" height="54" rx="2" (click)="setView('interior')"></rect>
                    
                    <!-- Hips -->
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[8])" x="54" y="208" width="92" height="34" rx="2" (click)="selectRegion(exteriorRegions[8])"></rect>
                    
                    <!-- Legs -->
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[9])" x="56" y="242" width="36" height="98" rx="2" (click)="selectRegion(exteriorRegions[9])"></rect>
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[9])" x="108" y="242" width="36" height="98" rx="2" (click)="selectRegion(exteriorRegions[9])"></rect>
                    
                    <!-- Feet -->
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[10])" x="50" y="340" width="44" height="22" rx="4" (click)="selectRegion(exteriorRegions[10])"></rect>
                    <rect class="body-region" [class.region-selected]="isSelected(exteriorRegions[10])" x="106" y="340" width="44" height="22" rx="4" (click)="selectRegion(exteriorRegions[10])"></rect>
                </svg>
                <button class="btn btn-sm w-100 mt-2" [class.btn-warning]="isSelected(exteriorRegions[11])" [class.btn-outline-secondary]="!isSelected(exteriorRegions[11])" (click)="selectRegion(exteriorRegions[11])">
                    <i class="bi bi-person-fill me-1"></i>The Skin
                </button>
            }
            @if (activeView === 'interior') {
                <svg class="body-svg" viewBox="0 0 200 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Interior organ diagram">
                    <g class="body-outline">
                        <ellipse cx="100" cy="42" rx="32" ry="38" />
                        <rect x="58" y="78" width="84" height="200" rx="8" />
                        <rect x="52" y="276" width="96" height="36" rx="4" />
                        <rect x="56" y="310" width="36" height="80" rx="4" />
                        <rect x="108" y="310" width="36" height="80" rx="4" />
                    </g>
                    <ellipse class="body-region" [class.region-selected]="isSelected(interiorRegions[0])" cx="100" cy="38" rx="26" ry="30" (click)="selectRegion(interiorRegions[0])"></ellipse>
                    <rect class="body-region region-secondary" [class.region-selected]="isSelected(interiorRegions[1])" x="94" y="78" width="12" height="198" rx="3" (click)="selectRegion(interiorRegions[1])"></rect>
                    <ellipse class="body-region" [class.region-selected]="isSelected(interiorRegions[9])" cx="100" cy="84" rx="14" ry="9" (click)="selectRegion(interiorRegions[9])"></ellipse>
                    <ellipse class="body-region" [class.region-selected]="isSelected(interiorRegions[2])" cx="82" cy="120" rx="16" ry="18" (click)="selectRegion(interiorRegions[2])"></ellipse>
                    <ellipse class="body-region" [class.region-selected]="isSelected(interiorRegions[4])" cx="72" cy="136" rx="15" ry="25" (click)="selectRegion(interiorRegions[4])"></ellipse>
                    <ellipse class="body-region" [class.region-selected]="isSelected(interiorRegions[4])" cx="128" cy="136" rx="15" ry="25" (click)="selectRegion(interiorRegions[4])"></ellipse>
                    <ellipse class="body-region region-secondary" [class.region-selected]="isSelected(interiorRegions[3])" cx="100" cy="168" rx="34" ry="12" (click)="selectRegion(interiorRegions[3])"></ellipse>
                    <rect class="body-region" [class.region-selected]="isSelected(interiorRegions[5])" x="112" y="172" width="28" height="22" rx="4" (click)="selectRegion(interiorRegions[5])"></rect>
                    <ellipse class="body-region" [class.region-selected]="isSelected(interiorRegions[6])" cx="95" cy="210" rx="28" ry="26" (click)="selectRegion(interiorRegions[6])"></ellipse>
                    <rect class="body-region" [class.region-selected]="isSelected(interiorRegions[7])" x="62" y="196" width="18" height="24" rx="4" (click)="selectRegion(interiorRegions[7])"></rect>
                    <rect class="body-region" [class.region-selected]="isSelected(interiorRegions[7])" x="120" y="196" width="18" height="24" rx="4" (click)="selectRegion(interiorRegions[7])"></rect>
                    <ellipse class="body-region region-secondary" [class.region-selected]="isSelected(interiorRegions[10])" cx="100" cy="248" rx="28" ry="16" (click)="selectRegion(interiorRegions[10])"></ellipse>
                    <rect class="body-region" [class.region-selected]="isSelected(interiorRegions[8])" x="66" y="276" width="68" height="30" rx="4" (click)="selectRegion(interiorRegions[8])"></rect>
                    <g class="region-labels" pointer-events="none">
                        <text x="100" y="38" text-anchor="middle" dominant-baseline="middle" font-size="7">Brain</text>
                        <text x="82" y="120" text-anchor="middle" dominant-baseline="middle" font-size="6">Heart</text>
                        <text x="72" y="136" text-anchor="middle" dominant-baseline="middle" font-size="5">Lung</text>
                        <text x="128" y="136" text-anchor="middle" dominant-baseline="middle" font-size="5">Lung</text>
                    </g>
                </svg>
            }
        </div>
    </div>

    <!-- Hint text -->
    <p class="hint-text text-center mt-2 small text-muted">
        @if (activeView === 'exterior') {
            Click a body region to filter results. Zoom in for head/face details.
        } @else {
            Click an organ to filter results.
        }
    </p>
</div>
