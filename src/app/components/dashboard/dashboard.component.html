<div class="container-fluid py-4">
    <div class="dashboard-hero p-4 rounded mb-4 shadow-lg position-relative">
        <div class="overlay position-absolute top-0 start-0 w-100 h-100"
            style="background: rgba(0,0,0,0.4); z-index: 1;"></div>
        <div class="row position-relative" style="z-index: 2;">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <h1 class="display-6 fw-bold text-uppercase text-white text-shadow" style="letter-spacing: 2px;">
                    <i class="bi bi-crosshair me-2"></i>Operation: Ouchie!
                </h1>

                <div class="dropdown">
                    <button class="btn btn-outline-light dropdown-toggle backdrop-blur" type="button" id="themeDropdown"
                        data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-palette me-2"></i>Loadout: {{ currentTheme }}
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow" aria-labelledby="themeDropdown"
                        style="background-color: var(--card-bg); border-color: var(--card-border);">
                        <li><button class="dropdown-item text-white" (click)="setTheme('Night Ops', 'default')">Night
                                Ops (Default)</button></li>
                        <li><button class="dropdown-item text-white"
                                (click)="setTheme('Oorah!', 'usmc')">Oorah!</button></li>
                        <li><button class="dropdown-item text-white"
                                (click)="setTheme('Jungle Standard', 'jungle')">Jungle Standard</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <!-- Filters -->
    <div class="col-md-10 mx-auto">
        <div class="card filter-card">
            <div class="card-body">
                <!-- Primary Text Filters -->
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label class="form-label text-muted small">Diagnostic Code</label>
                        <input type="text" class="form-control" placeholder="e.g. 5260" [(ngModel)]="searchCode"
                            (input)="applyFilter()" autocomplete="off">
                    </div>
                    <div class="col-md-9">
                        <label class="form-label text-muted small">Body Part or Condition</label>
                        <input type="text" class="form-control" placeholder="e.g. Ankle, Shoulder, Sinusitis..."
                            [(ngModel)]="searchCondition" (input)="applyFilter()" autocomplete="off">
                    </div>
                </div>

                <!-- Secondary Group Filters -->
                <div class="row g-3">
                    <div class="col-md-5">
                        <div class="filter-input-group">
                            <select class="form-select" [(ngModel)]="selectedSystem" (change)="onSystemChange()">
                                <option value="">Filter by System (Optional)</option>
                                <option *ngFor="let group of systemGroupings" [value]="group.name">{{ group.name }}
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="filter-input-group">
                            <select class="form-select" [(ngModel)]="selectedSubSystem" (change)="applyFilter()"
                                [disabled]="!selectedSystem || availableSubSystems.length === 0">
                                <option value="">Filter by Sub-Group (Optional)</option>
                                <option *ngFor="let sub of availableSubSystems" [value]="sub">{{ sub }}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button class="btn btn-outline-warning clear-btn w-100" (click)="clearFilters()">Clear
                            All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Results -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" *ngFor="let rating of filteredRatings">
            <div class="card rating-card">
                <div class="card-header">
                    <span class="badge bg-primary">{{ rating.code }}</span>
                    <div class="text-end">
                        <small class="grouping-label d-block text-white">{{ rating.system }}</small>
                        <small class="text-muted" *ngIf="rating.subSystem">{{ rating.subSystem }}</small>
                    </div>
                </div>
                <div class="card-body">
                    <h5 class="card-title">{{ rating.condition }}</h5>
                    <p *ngIf="rating.notes" class="card-text notes-text"><i class="bi bi-info-circle me-1"></i>{{
                        rating.notes }}</p>

                    <div class="table-responsive mt-3">
                        <table class="table table-sm table-borderless table-striped criteria-table">
                            <thead>
                                <tr>
                                    <th style="width: 20%">Rating</th>
                                    <th>Criteria</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr *ngFor="let criterion of rating.criteria">
                                    <td class="rating-percent">{{ criterion.percent }}%</td>
                                    <td class="criteria-desc">{{ criterion.description }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer text-end" *ngIf="rating.link">
                    <a [href]="getFragmentLink(rating.link, rating.code)" target="_blank"
                        class="btn btn-sm btn-outline-info">
                        View 38CFR <i class="bi bi-box-arrow-up-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div *ngIf="filteredRatings.length === 0" class="no-results">
        <h3>No results found</h3>
        <p>Try adjusting your search terms.</p>
    </div>
</div>
